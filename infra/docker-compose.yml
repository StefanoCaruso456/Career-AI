services:
  postgres:
    image: postgres:16-alpine
    container_name: career-ledger-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: career_ledger
      POSTGRES_PASSWORD: career_ledger_dev
      POSTGRES_DB: career_ledger
    ports:
      - "5433:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U career_ledger -d career_ledger"]
      interval: 3s
      timeout: 3s
      retries: 10

volumes:
  postgres_data:
